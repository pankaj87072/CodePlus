<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CodePulse</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="cp-popup-header">
    <span class="cp-logo">⏱</span>
    <h1>CodePulse</h1>
  </header>

  <main>
    <!-- Logged out: logo + Continue with Google only -->
    <section id="section-logged-out" class="cp-section">
      <p class="cp-hint">Sign in to track your solve times and get a personalized target for every problem.</p>
      <button id="btn-google" class="cp-btn cp-btn-google">
        <svg class="cp-google-icon" viewBox="0 0 48 48" width="16" height="16" aria-hidden="true">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.9 32.7 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.4-.4-3.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34.6 6.1 29.6 4 24 4c-8.1 0-15 4.6-18.7 11.4z"/>
          <path fill="#4CAF50" d="M24 44c5.5 0 10.4-1.9 14.2-5.1l-6.6-5.4C29.6 35.4 26.9 36 24 36c-5.4 0-9.9-3.3-11.3-8l-6.6 5.1C9.1 39.4 16 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3-3.5 5.4-6.6 6.9l6.6 5.4C39.3 37 44 31 44 24c0-1.2-.1-2.4-.4-3.5z"/>
        </svg>
        Continue with Google
      </button>
      <p id="login-error" class="cp-hint cp-small cp-error hidden"></p>
    </section>

    <!-- Logged in -->
    <section id="section-logged-in" class="cp-section hidden">
      <div class="cp-profile-row">
        <img id="profile-avatar" class="cp-avatar" src="" alt="" />
        <div class="cp-profile-text">
          <strong id="profile-name">-</strong>
          <span id="profile-email" class="cp-hint cp-small">-</span>
        </div>
      </div>

      <div class="cp-toggle-row">
        <span>Timer</span>
        <label class="cp-switch">
          <input type="checkbox" id="timer-toggle" />
          <span class="cp-switch-slider"></span>
        </label>
      </div>

      <div class="cp-stats-grid">
        <div class="cp-stat">
          <div class="cp-stat-value" id="stat-solved">-</div>
          <div class="cp-stat-label">Solved</div>
        </div>
        <div class="cp-stat">
          <div class="cp-stat-value" id="stat-streak">-</div>
          <div class="cp-stat-label">Streak</div>
        </div>
        <div class="cp-stat">
          <div class="cp-stat-value" id="stat-avg">-</div>
          <div class="cp-stat-label">Avg time</div>
        </div>
      </div>

      <button id="btn-logout" class="cp-link-btn">Logout</button>
    </section>
  </main>

  <footer class="cp-popup-footer">
    <span class="cp-hint cp-small">Timer lives on the LeetCode page - this popup is settings only.</span>
  </footer>

  <script src="popup.js" type="module"></script>
</body>
</html>
